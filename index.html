<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Papa 🎉</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    color: white;

    background: url("background.png") no-repeat center center fixed;
    background-size: cover;
}

body::before {
    content: "";
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.3);
    z-index: -1;
}

h1 {
    margin-top: 40px;
    font-size: 8vw;
    text-shadow: 2px 2px 10px black;
}

img {
    width: 80vw;
    max-width: 350px;
    height: auto;
    margin-top: 20px;
    border-radius: 15px;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
}
</style>

</head>

<body>

<h1>Happy Birthday Papa 🎉</h1>
<img id="slideshow" src="bilda.jpeg">

<script>
const images = [
    "bilda.jpeg",
    "bildb.jpeg",
    "bildc.jpeg",
    "bildd.jpeg",
    "bilde.jpeg",
    "bildf.jpeg",
    "bildg.jpeg",
    "bildh.jpeg",
    "bildi.jpeg",
    "bildj.jpeg",
    "bildk.jpeg",
    "bildL.jpeg",
    "bildm.jpeg",
    "bildn.jpeg",
    "bildo.jpeg",
    "bildp.jpeg",
    "bildq.jpeg"
];

let index = 0;

setInterval(() => {
    index = (index + 1) % images.length;
    document.getElementById("slideshow").src = images[index];
}, 3000);
</script>

</body>
</html>
