<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Papa 🎉</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    text-align: center;
    background: black;
    color: white;
}

h1 {
    margin-top: 50px;
    font-size: 50px;
    z-index: 2;
    position: relative;
}

img {
    width: 300px;
    height: 300px;
    object-fit: cover;
    margin-top: 30px;
    border-radius: 15px;
    z-index: 2;
    position: relative;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1;
}
</style>

</head>

<body>

<h1>Happy Birthday Papa 🎉</h1>
<img id="slideshow" src="bilda.jpeg">

<canvas id="confetti"></canvas>

<script>
// 📸 Bilder (hier ändern!)
const images = [
    "bilda.jpeg",
    "bildb.jpeg",
	"bildc.jpeg",
	"bildd.jpeg",
	"bilde.jpeg",
	"bildf.jpeg",
	"bildg.jpeg",
	"bildh.jpeg",
	"bildi.jpeg",
	"bildj.jpeg",
	"bildk.jpeg",
	"bildL.jpeg",
	"bildm.jpeg",
	"bildn.jpeg",
	"bildo.jpeg",
	"bildp.jpeg",
	"bildq.jpeg"
];

let index = 0;

setInterval(() => {
    index = (index + 1) % images.length;
    document.getElementById("slideshow").src = images[index];
}, 3000);

// 🎊 Konfetti
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let confetti = [];

for (let i = 0; i < 150; i++) {
    confetti.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 6 + 2,
        d: Math.random() * 5 + 1
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "white";

    confetti.forEach(c => {
        ctx.beginPath();
        ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
        ctx.fill();
    });

    update();
}

function update() {
    confetti.forEach(c => {
        c.y += c.d;
        if (c.y > canvas.height) {
            c.y = 0;
            c.x = Math.random() * canvas.width;
        }
    });
}

setInterval(draw, 20);
</script>

</body>
</html>
